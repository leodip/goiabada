# Reference data for pt-BR — curated timezone display labels keyed by IANA ID.
#
# Hand-maintained: only zones that warrant a friendlier label than the default
# are listed. Zones not listed fall back to a "<country> - <zone>" label
# assembled at runtime (see i18n.RefTimezone). There is no generator for this
# file, and it is embedded-only (not runtime-overridable).

"America/New_York" = "Horário do Leste"
"America/Sao_Paulo" = "Horário de Brasília"
"Europe/London" = "Horário de Greenwich"
"Europe/Paris" = "Horário da Europa Central"
"UTC" = "Tempo Universal Coordenado"
